# ── About ──────────────────────────────────────────────────────────────
# Use | for multi-line text. Indent each line by 2 spaces.
about: |
  Backend-разработчик с 5+ годами коммерческого опыта в финтех-системах. Специализируюсь на Java/Kotlin, Spring Boot и высоконагруженных сервисах

  Имею опыт со-основателя IoT-стартапа: в одиночку собрал full-stack систему (бэкенд, фронтенд на Angular, DevOps и софт для Raspberry Pi на Python), собрал команду и довёл проект до государственного гранта и межрегиональных клиентов
  
  Привык работать на стыке технологий и продукта - проектирую архитектуру, пишу код, провожу code review, менторю младших коллег и замещаю руководителя команды
  
  Неоднократно принимал участие в хакатонах в качестве капитана команды и занимал призовые места
  
  Автор технических статей на Хабр (85000+ просмотров)
  
  Английский уровня C1, готов к коммуникации с зарубежными командами и клиентами


