# ── Experience ─────────────────────────────────────────────────────────
experience:
  - company: "Солантек"
    role: "Java/Kotlin Sotfware Engineer"
    period: "2021 – Present"
    description: |
      Разрабатывал высоконагруженную систему тестирования электронных платежей для банков из ТОП‑10 на Java 17 и Kotlin. Проектировал SOA‑архитектуру, реализовывал протокольные сервисы (gRPC, SOAP, TCP) и интеграционные шины. Работал с PostgreSQL и Oracle через Hibernate — оптимизировал запросы и устранял N+1 проблемы.
      Замещал Team Lead команды из 10 человек: проводил daily, planning, оценивал архитектурные решения, занимался онбордингом новичков. Организовал цикл лекций по ключевым модулям, снизив bus factor с 2 до 5 разработчиков. Обучил 3 стажёров, двое из которых впоследствии вошли в основной состав.
      С нуля построил эмулятор СБП с нагрузкой 1000+ TPS — продукт внедрён в 3 банка из ТОП‑10. Спроектировал модуль аудита с доставкой событий через Kafka. Разработал S3‑адаптер (Amazon S3, Ceph S3), который приняли 8 команд. В инициативном порядке создал поиск по 700+ GitLab‑репозиториям на Lucene — сервис используют 150+ сотрудников.
    highlights:
      - FinTech
      - Java
      - Kotlin
      - Spring Boot
      - PostgreSQL
      - Kafka
      - gRPC
      - Team Leadership
      - System Design (SOA/DDD)
      - S3
      - Lucene

  - company: "CapyPrint (Стартап)"
    role: "Co-founder & CTO / Technical Lead"
    period: "2025-02 – 2025-10"
    description: |
      Со‑основатель стартапа по автоматизированной печати. В одиночку спроектировал и реализовал full‑stack систему: бэкенд на Java/Kotlin, фронтенд на Angular, ПО для Raspberry Pi на Python, интеграцию с Telegram Bot API и платёжным шлюзом ЮKassa. Организовал связь терминалов с облаком через MQTT.
      Собрал и возглавил команду из 4 разработчиков, выстроил все процессы с нуля. За 2 месяца довёл продукт до работающего MVP, что позволило привлечь грант Фонда содействия инновациям на 1 млн рублей и заключить 2 пилотных соглашения с реальными клиентами. Настроил CI/CD через GitHub Actions, обеспечив предсказуемый релизный цикл.
    highlights:
      - Startup
      - IoT (Raspberry Pi / Python)
      - Full‑Stack (Java + Angular)
      - Team Building
      - MVP in 2 months
      - Government Grant
      - MQTT
      - Telegram Bot API
      - Payment Integration (ЮKassa)

  - company: "Ланит-Терком"
    role: "Java Developer"
    period: "2021-02 – 2021-06"
    description: |
      Разрабатывал бэкенд образовательного сервиса для подготовки к собеседованиям на Java 11 и Spring Boot с хранением данных в MySQL. Самостоятельно спроектировал схему БД и архитектуру сервиса, описал REST API через Swagger и интегрировал его с фронтендом без доработок на этапе стыковки.
      Обеспечил покрытие кодовой базы юнит‑тестами свыше 50%, что сократило число регрессионных багов. Разработал и опубликовал в корпоративном Maven‑репозитории библиотеку‑обёртку над Java IO/NIO — инструмент приняли две смежные команды, он упростил файловые операции на других проектах.
    highlights:
      - EdTech
      - Java
      - Spring Boot
      - REST API / Swagger
      - MySQL / Hibernate
      - Unit Testing (50%+ coverage)
      - Library Development (IO/NIO)
      - Layered Architecture

  - company: "Vigo Lab"
    role: "Java Developer (Intern)"
    period: "2020-07 – 2020-08"
    description: |
      Первая стажировка в системе аналитики качества передачи данных для сотового оператора. Занимался бэкенд‑разработкой на Java 8: внедрял новый функционал, правил баги, писал юнит‑тесты.
      Реализовал адаптер для стыковки legacy‑модулей с актуальной версией системы — сохранил работоспособность старого кода без переписывания. Разработал конвертер из JSON в MessagePack, сократив объём передаваемых данных на 10%. Написал скрипты миграции БД, полностью автоматизировав переход на новую структуру хранения и исключив ручные операции в боевом контуре.
    highlights:
      - Telecom (Mobile Networks)
      - Java
      - Legacy Integration
      - MessagePack
      - Data Optimization (-10% size)
      - Database Migration

